<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretty Petty - Register</title>
     
    <link rel="stylesheet" href="/css/customer.css">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.1/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="/css/jquery-ui-overrides.css">
</head>
<body>

    <nav>
        <a href="index.html">Home</a> | 
        <a href="login.html">Login</a>
    </nav>

    <h2>Create an Account</h2>

    <div id="general-error" style="color: red; display: none;"></div>

    <form id="register-form">
        
        <div>
            <label for="first_name">First Name:</label><br>
            <input type="text" id="first_name" name="first_name" required>
            <span class="error-text" id="first_name-error" style="color: red;"></span>
        </div>
        <br>

        <div>
            <label for="last_name">Last Name:</label><br>
            <input type="text" id="last_name" name="last_name" required>
            <span class="error-text" id="last_name-error" style="color: red;"></span>
        </div>
        <br>

        <div>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required>
            <span class="error-text" id="email-error" style="color: red;"></span>
        </div>
        <br>

        <div>
            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password" required>
            <span class="error-text" id="password-error" style="color: red;"></span>
        </div>
        <br>

        <div>
            <label for="password_confirmation">Confirm Password:</label><br>
            <input type="password" id="password_confirmation" name="password_confirmation" required>
            <span class="error-text" id="password_confirmation-error" style="color: red;"></span>
        </div>
        <br>

        <div>
            <label for="delivery_address">Delivery Address (Optional):</label><br>
            <textarea id="delivery_address" name="delivery_address" rows="3"></textarea>
            <span class="error-text" id="delivery_address-error" style="color: red;"></span>
        </div>
        <br>

        <div>
            <label for="image">Profile Image (Optional):</label><br>
            <input type="file" id="image" name="image" accept="image/*">
            <span class="error-text" id="image-error" style="color: red;"></span>
        </div>
        <br>

        <button type="submit">Register</button>

    </form>

    <p>Already have an account? <a href="login.html">Login here</a></p>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.14.1/jquery-ui.min.js"></script>
    <script src="/js/ui-common.js"></script>
    <script src="/js/register.js"></script>
</body>
</html>
