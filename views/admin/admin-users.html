<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretty Petty Admin — Users</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.1/themes/base/jquery-ui.css">
  <link rel="stylesheet" href="/css/jquery-ui-overrides.css">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>
<body>

  <!-- NAV (exact same as other admin pages) -->
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="/admin/dashboard.html" class="nav-brand">
        <img src="/uploads/pretty-petty-logo-nav.png" alt="Pretty Petty" class="nav-logo">
        <span>Pretty Petty <small class="nav-admin-badge">Admin</small></span>
      </a>
      <div class="nav-links">
        <a href="/index.html" id="nav-home-link">Store</a>
        <a href="/admin/dashboard.html">Dashboard</a>
        <a href="/admin/products.html">Products</a>
        <a href="/admin/categories.html">Categories</a>
        <a href="/admin/users.html" class="active">Users</a>
        <a href="/admin/orders.html">Orders</a>
        <a href="/admin/reviews.html">Reviews</a>
      </div>
      <div class="nav-user" id="nav-user" style="display:none;">
        <a href="/profile.html" class="nav-user-link">
          <img id="user-avatar" src="/uploads/default.png" class="nav-avatar">
          <span id="user-display-name"></span>
        </a>
        <a href="#" id="logout-link">Logout</a>
      </div>
      <div id="user-bar" style="display:none;"></div>
    </div>
  </nav>

  <div id="alert-banner" class="alert-banner" style="display:none;"></div>

  <!-- MAIN -->
  <section class="admin-section" style="padding-bottom:0;">
    <div class="admin-inner">
      <p class="admin-overline">People</p>
      <h2 class="admin-title">Manage Users</h2>

      <div id="action-success"></div>
      <div id="action-error"></div>

      <!-- Filters bar -->
      <div class="admin-filters-bar">
        <label class="admin-filter-toggle">
          <input type="checkbox" id="include-deleted"> Include deleted users
        </label>
        <button type="button" id="bulk-delete-btn" class="ghost-btn danger-btn" style="display:none;">
          Delete Selected (<span id="selected-count">0</span>)
        </button>
      </div>

      <!-- Users Table -->
      <table id="users-table" style="width:100%;">
        <thead>
          <tr>
            <th><input type="checkbox" id="select-all"></th>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Address</th>
            <th>Registered</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <div class="admin-divider" style="margin:32px auto;"></div>

      <p class="admin-overline">Add & Edit</p>
      <h2 class="admin-title">User Form</h2>

      <div class="admin-form-card" style="margin-bottom:0;">
        <form id="user-form" novalidate>
          <input type="hidden" id="edit-user-id" name="id" value="">

          <div class="form-row">
            <div class="form-col">
              <label for="edit-first-name">First Name</label>
              <input type="text" id="edit-first-name" name="first_name">
              <span class="error-text" id="edit-first-name-error"></span>
            </div>
            <div class="form-col">
              <label for="edit-last-name">Last Name</label>
              <input type="text" id="edit-last-name" name="last_name">
              <span class="error-text" id="edit-last-name-error"></span>
            </div>
          </div>

          <label for="edit-email">Email</label>
          <input type="email" id="edit-email" name="email">
          <span class="error-text" id="edit-email-error"></span>

          <div class="form-row" id="password-row">
            <div class="form-col">
              <label for="edit-password">Password</label>
              <input type="password" id="edit-password" name="password" placeholder="Leave blank when editing">
              <span class="error-text" id="edit-password-error"></span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-col">
              <label for="edit-role">Role</label>
              <select id="edit-role" name="role">
                <option value="customer">Customer</option>
                <option value="admin">Admin</option>
              </select>
              <span class="error-text" id="edit-role-error"></span>
            </div>
            <div class="form-col">
              <label for="edit-status">Status</label>
              <select id="edit-status" name="status">
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
              <span class="error-text" id="edit-status-error"></span>
            </div>
          </div>

          <div id="self-edit-warning" class="self-edit-warning" style="display:none;">
            You cannot change your own role or status.
          </div>

          <div style="display:flex;gap:12px;margin-top:8px;padding-top:20px;">
            <button type="submit" id="submit-btn">Add User</button>
            <button type="button" id="cancel-edit-btn" style="display:none;">Cancel Edit</button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-bottom">
        <p style="font-size:11px;color:#aaa;">&copy; 2025 Pretty Petty Admin. All rights reserved.</p>
      </div>
    </div>
  </footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://code.jquery.com/ui/1.14.1/jquery-ui.min.js"></script>
<script src="/js/ui-common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="/js/admin-users.js"></script>
</body>
</html>
