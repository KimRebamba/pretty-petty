<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretty Petty Admin — Categories</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.1/themes/base/jquery-ui.css">
  <link rel="stylesheet" href="/css/jquery-ui-overrides.css">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>
<body>

  <!-- ── NAV ── -->
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="/admin/dashboard.html" class="nav-brand">
        <img src="/uploads/pretty-petty-logo-nav.png" alt="Pretty Petty" class="nav-logo">
         <span>Pretty Petty <small class="nav-admin-badge">Admin</small></span>
      </a>
      <div class="nav-links">
         <a href="/index.html" id="nav-home-link">Store</a>
        <a href="/admin/dashboard.html">Dashboard</a>
        <a href="/admin/products.html">Products</a>
        <a href="/admin/categories.html" class="active">Categories</a>
        <a href="/admin/users.html">Users</a>
        <a href="/admin/orders.html">Orders</a>
        <a href="/admin/reviews.html">Reviews</a>
    
      </div>
      <div class="nav-user" id="nav-user" style="display:none;">
        <a href="/profile.html" class="nav-user-link">
          <img id="user-avatar" src="/uploads/default.png" class="nav-avatar">
          <span id="user-display-name"></span>
        </a>
        <a href="#" id="logout-link">Logout</a>
      </div>
      <div id="user-bar" style="display:none;"></div>
    </div>
  </nav>

  <div id="alert-banner" class="alert-banner" style="display:none;"></div>

  <!-- ── MAIN CONTENT ── -->
  <section class="admin-section" style="padding-bottom: 0px;">
    <div class="admin-inner">
      <p class="admin-overline">Organization</p>
      <h2 class="admin-title">Manage Categories</h2>

      <div id="form-success"></div>
      <div id="form-error"></div>

      <div class="admin-filter-bar">
        <div class="admin-filter-group">
          <label>Status</label>
          <select id="filter-status" class="admin-filter-select">
            <option value="">All</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
        <div class="admin-filter-group">
          <label>Trashed</label>
          <select id="filter-trashed" class="admin-filter-select">
            <option value="false">Only Active</option>
            <option value="true">Include Trashed</option>
          </select>
        </div>
      </div>

      <!-- Categories Table -->
      <table id="categories-table" style="width:100%;">
        <thead>
          <tr>
            <th><input type="checkbox" id="select-all-checkbox"></th>
            <th>ID</th>
            <th>Image</th>
            <th>Name</th>
            <th>Description</th>
            <th>Status</th>
            <th>Created At</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <div class="admin-bulk-bar" id="bulk-bar" style="display:none;">
        <span class="admin-bulk-count"><span id="selected-count">0</span> selected</span>
        <button id="bulk-delete-btn" class="admin-btn-danger">Delete Selected</button>
      </div>

     <div class="admin-divider" style="margin:32px auto;"></div>

     <p class="admin-overline">Add & Edit</p>
    <h2 class="admin-title">Category Form</h2>

      <!-- Category Form -->
      <div class="admin-form-card" style="margin-bottom: 0px;">

        <form id="category-form" novalidate>
          <input type="hidden" id="cat-id" name="id" value="">

          <label for="cat-name">Category Name</label>
          <input type="text" id="cat-name" name="name">
          <span class="error-text" id="cat-name-error"></span>

          <label for="cat-description">Description</label>
          <textarea id="cat-description" name="description" rows="3"></textarea>
          <span class="error-text" id="cat-description-error"></span>

          <label for="cat-status">Status</label>
          <select id="cat-status" name="status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
          <span class="error-text" id="cat-status-error"></span>

          <label for="cat-image" style="padding-top: 20px;">Category Image</label>
          <input type="file" id="cat-image" name="image" accept="image/*">
          <div id="current-image-container" style="display:none;">
            <p>Current Image:</p>
            <img id="current-image-preview" src="" alt="Current Image">
          </div>
          <span class="error-text" id="cat-image-error"></span>

          <div style="display:flex;gap:12px;margin-top:8px; padding-top: 20px;">
            <button type="submit" id="submit-btn">Add Category</button>
            <button type="button" id="cancel-edit-btn" style="display:none;">Cancel Edit</button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <!-- ── FOOTER ── -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-bottom">
        <p style="font-size:11px;color:#aaa;">&copy; 2025 Pretty Petty Admin. All rights reserved.</p>
      </div>
    </div>
  </footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://code.jquery.com/ui/1.14.1/jquery-ui.min.js"></script>
<script src="/js/ui-common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="/js/admin-categories.js"></script>
</body>
</html>
